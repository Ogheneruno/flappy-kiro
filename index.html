<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Kiro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2d2b55;
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            position: relative;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .game-wrapper {
            border: 6px solid #3d3b65;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
        }

        .score-bar {
            background-color: #1a1a2e;
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Settings Panel */
        .settings-toggle {
            position: absolute;
            top: 10px;
            right: -50px;
            width: 36px;
            height: 36px;
            background: #3d3b65;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .settings-toggle:hover {
            background: #4d4b75;
        }

        .settings-panel {
            position: absolute;
            top: 0;
            right: -320px;
            width: 300px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            max-height: 560px;
            overflow-y: auto;
            display: none;
        }

        .settings-panel.open {
            display: block;
        }

        .settings-panel h3 {
            margin-bottom: 16px;
            font-size: 16px;
            color: #a0a0d0;
            border-bottom: 1px solid #3d3b65;
            padding-bottom: 8px;
        }

        .setting-group {
            margin-bottom: 14px;
        }

        .setting-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #ccc;
            margin-bottom: 4px;
        }

        .setting-group label span {
            color: #7c7cff;
            font-weight: bold;
            font-size: 12px;
        }

        .setting-group input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #3d3b65;
            border-radius: 3px;
            outline: none;
        }

        .setting-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #7c7cff;
            cursor: pointer;
        }

        .settings-panel .reset-btn {
            width: 100%;
            padding: 8px;
            margin-top: 12px;
            background: #3d3b65;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .settings-panel .reset-btn:hover {
            background: #5d5b85;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div class="score-bar" id="scoreBar">Score: 0 | High: 0</div>
        </div>

        <button class="settings-toggle" id="settingsToggle" title="Settings">⚙</button>

        <div class="settings-panel" id="settingsPanel">
            <h3>⚙ Game Settings</h3>

            <div class="setting-group">
                <label>Gravity <span id="gravityVal">0.4</span></label>
                <input type="range" id="gravitySlider" min="0.1" max="1.0" step="0.05" value="0.4">
            </div>

            <div class="setting-group">
                <label>Jump Force <span id="jumpForceVal">7</span></label>
                <input type="range" id="jumpForceSlider" min="3" max="12" step="0.5" value="7">
            </div>

            <div class="setting-group">
                <label>Pipe Gap <span id="pipeGapVal">160</span></label>
                <input type="range" id="pipeGapSlider" min="80" max="300" step="10" value="160">
            </div>

            <div class="setting-group">
                <label>Pipe Speed <span id="pipeSpeedVal">2.5</span></label>
                <input type="range" id="pipeSpeedSlider" min="1" max="6" step="0.25" value="2.5">
            </div>

            <div class="setting-group">
                <label>Pipe Width <span id="pipeWidthVal">70</span></label>
                <input type="range" id="pipeWidthSlider" min="30" max="120" step="5" value="70">
            </div>

            <div class="setting-group">
                <label>Spawn Interval <span id="spawnIntervalVal">180</span></label>
                <input type="range" id="spawnIntervalSlider" min="60" max="360" step="10" value="180">
            </div>

            <div class="setting-group">
                <label>Ghosty Size <span id="ghostySizeVal">36</span></label>
                <input type="range" id="ghostySizeSlider" min="20" max="60" step="2" value="36">
            </div>

            <div class="setting-group">
                <label>Hitbox Inset <span id="hitboxInsetVal">4</span></label>
                <input type="range" id="hitboxInsetSlider" min="0" max="12" step="1" value="4">
            </div>

            <button class="reset-btn" id="resetDefaults">Reset to Defaults</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="game.js"></script>
    <script src="settings.js"></script>
</body>
</html>
